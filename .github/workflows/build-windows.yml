# ═══════════════════════════════════════════════════════
# 🌊 Pacific CLI — Build Windows Packages (EXE + MSI + MSIX)
# ═══════════════════════════════════════════════════════
#
# Triggered on push to main or manual dispatch.
# 1. Builds pacific.exe via PyInstaller
# 2. Packages into .msi using WiX Toolset v4
# 3. Packages into .msix using Windows SDK makeappx
# 4. Uploads .exe, .msi, and .msix artifacts

name: Build Pacific CLI for Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows-packages:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv pyinstaller
        shell: cmd

      - name: Build pacific.exe with PyInstaller
        working-directory: cli
        run: |
          pip install -e .
          pyinstaller --onefile --name pacific --console --collect-all pacific_cli entry.py
        shell: cmd

      - name: Verify executable exists
        working-directory: cli
        run: dir dist\pacific.exe
        shell: cmd

      # ─── MSI Build using WiX v5 ───
      - name: Install WiX Toolset v5
        run: dotnet tool install --global wix --version 5.0.2
        shell: cmd

      - name: Create WiX source file
        working-directory: cli
        run: |
          import textwrap, pathlib
          wxs = textwrap.dedent("""\
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package Name="Pacific Financial AI CLI"
                     Manufacturer="GRRN"
                     Version="1.0.0.0"
                     UpgradeCode="6B45C4FB-290E-4232-B46B-3CE2666272FE"
                     Scope="perUser">

              <MajorUpgrade DowngradeErrorMessage="A newer version of Pacific CLI is already installed." />
              <MediaTemplate EmbedCab="yes" />

              <Feature Id="MainFeature" Title="Pacific CLI" Level="1">
                <ComponentGroupRef Id="ProductComponents" />
                <ComponentGroupRef Id="PathComponents" />
              </Feature>
            </Package>

            <Fragment>
              <StandardDirectory Id="LocalAppDataFolder">
                <Directory Id="GRRN_DIR" Name="GRRN">
                  <Directory Id="INSTALLFOLDER" Name="PacificCLI" />
                </Directory>
              </StandardDirectory>
            </Fragment>

            <Fragment>
              <ComponentGroup Id="ProductComponents" Directory="INSTALLFOLDER">
                <Component Id="PacificExe" Guid="A1B2C3D4-E5F6-7890-ABCD-EF1234567890">
                  <File Id="pacific.exe" Source="dist\\pacific.exe" KeyPath="yes" />
                </Component>
              </ComponentGroup>
            </Fragment>

            <Fragment>
              <ComponentGroup Id="PathComponents" Directory="INSTALLFOLDER">
                <Component Id="PathEntry" Guid="B2C3D4E5-F6A7-8901-BCDE-F12345678901">
                  <Environment Id="PATH" Name="PATH" Value="[INSTALLFOLDER]" Permanent="no" Part="last" Action="set" System="no" />
                </Component>
              </ComponentGroup>
            </Fragment>
          </Wix>
          """)
          pathlib.Path("pacific.wxs").write_text(wxs)
          print("=== WiX source created ===")
          print(wxs)
        shell: python

      - name: Build MSI package
        working-directory: cli
        run: |
          wix build pacific.wxs -o pacific-cli.msi
          dir pacific-cli.msi
        shell: cmd

      # ─── MSIX Build ───
      - name: Prepare MSIX package layout
        working-directory: cli
        run: |
          mkdir msix_layout
          copy dist\pacific.exe msix_layout\
          copy AppxManifest.xml msix_layout\
          xcopy assets msix_layout\assets\ /E /I /Y
          echo === Layout contents ===
          dir msix_layout\
          dir msix_layout\assets\
        shell: cmd

      - name: Find Windows SDK makeappx.exe
        id: find-sdk
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" | Where-Object { $_.FullName -match "x64" } | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($makeappx) {
            echo "MAKEAPPX=$($makeappx.FullName)" >> $env:GITHUB_OUTPUT
            Write-Host "Found makeappx at: $($makeappx.FullName)"
          } else {
            Write-Error "makeappx.exe not found"
            exit 1
          }
        shell: pwsh

      - name: Build MSIX package
        working-directory: cli
        run: |
          "${{ steps.find-sdk.outputs.MAKEAPPX }}" pack /d msix_layout /p pacific-cli.msix /o
          dir pacific-cli.msix
        shell: cmd

      # ─── Upload artifacts ───
      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacific-windows-exe
          path: cli/dist/pacific.exe
          retention-days: 90

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacific-windows-msi
          path: cli/pacific-cli.msi
          retention-days: 90

      - name: Upload .msix artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacific-windows-msix
          path: cli/pacific-cli.msix
          retention-days: 90
