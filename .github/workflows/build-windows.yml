# ═══════════════════════════════════════════════════════
# 🌊 Pacific CLI — Build Windows .exe
# ═══════════════════════════════════════════════════════
#
# Triggered on push to main or manual dispatch.
# Builds pacific.exe via PyInstaller on a Windows runner.
# Download the artifact and upload to Microsoft Partner Center.

name: Build Pacific CLI for Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv pyinstaller
        shell: cmd

      - name: Build pacific.exe with PyInstaller
        working-directory: cli
        run: |
          pyinstaller --onefile --name pacific --console --collect-all pacific_cli pacific_cli\__main__.py
        shell: cmd

      - name: Verify executable
        working-directory: cli
        run: |
          dir dist\pacific.exe
          dist\pacific.exe --version
        shell: cmd

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacific-windows-exe
          path: cli/dist/pacific.exe
          retention-days: 90
